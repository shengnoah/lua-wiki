<h1 class="article-title"><span>Lua Table Parser</span></h1>
<p>PyLuaTblParser类中有两个私有变量：</p>
<ol>
<li><code>self.str_praser</code>是类<code>LuaStrParser</code>的实例，用来实现lua字符串的解析。</li>
<li><code>self.lua_table</code>是一个<code>dict</code>或者<code>list</code>，用来储存从lua table字符串或者其他dict中读取的数据。</li>
</ol>
<h2 id="接口"><a href="#接口" class="headerlink" title="接口"></a>接口</h2><figure class="highlight python"><table><tbody><tr><td class="gutter"><pre><span class="line">1</span><br/><span class="line">2</span><br/><span class="line">3</span><br/><span class="line">4</span><br/><span class="line">5</span><br/><span class="line">6</span><br/><span class="line">7</span><br/><span class="line">8</span><br/><span class="line">9</span><br/><span class="line">10</span><br/><span class="line">11</span><br/><span class="line">12</span><br/><span class="line">13</span><br/><span class="line">14</span><br/><span class="line">15</span><br/><span class="line">16</span><br/><span class="line">17</span><br/><span class="line">18</span><br/><span class="line">19</span><br/><span class="line">20</span><br/><span class="line">21</span><br/><span class="line">22</span><br/><span class="line">23</span><br/></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">def</span> <span class="params">(self, s)</span>:</span></span><br/><span class="line">读取Lua table数据，输入s为一个符合Lua table定义的字符串，无返回值</span><br/><span class="line">遇到Lua table格式错误则抛出异常</span><br/><span class="line"></span><br/><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">dump</span><span class="params">(self)</span>:</span></span><br/><span class="line">根据类中数据返回Lua table字符串</span><br/><span class="line"></span><br/><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">loadLuaTable</span><span class="params">(self, f)</span>:</span></span><br/><span class="line">从文件中读取Lua table字符串，f为文件路径，遇到Lua Table的格式错误则抛出异常，文件操作失败抛出异常</span><br/><span class="line"></span><br/><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">dumpLuaTable</span><span class="params">(self, f)</span>:</span></span><br/><span class="line">将类中的内容以Lua table格式存入文件，f为文件路径，文件若存在则覆盖，文件操作失败抛出异常</span><br/><span class="line"></span><br/><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">loadDict</span><span class="params">(self, d)</span>:</span></span><br/><span class="line">读取dict中的数据，存入类中，只处理数字和字符串两种类型的key，其他类型的key直接忽略</span><br/><span class="line"></span><br/><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">dumpDict</span><span class="params">(self)</span>:</span></span><br/><span class="line">返回一个dict，包含类中的数据</span><br/><span class="line"></span><br/><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">update</span><span class="params">(self, d)</span>:</span></span><br/><span class="line">用字典d更新类中的数据，类似于字典的update</span><br/><span class="line"></span><br/><span class="line">PyLuaTblParser类支持用[]进行赋值、读写数据的操作，类似字典</span><br/></pre></td></tr></tbody></table></figure>

an><br/><span class="line">412</span><br/><span class="line">413</span><br/><span class="line">414</span><br/><span class="line">415</span><br/><span class="line">416</span><br/><span class="line">417</span><br/><span class="line">418</span><br/><span class="line">419</span><br/><span class="line">420</span><br/><span class="line">421</span><br/><span class="line">422</span><br/><span class="line">423</span><br/><span class="line">424</span><br/><span class="line">425</span><br/><span class="line">426</span><br/><span class="line">427</span><br/><span class="line">428</span><br/><span class="line">429</span><br/><span class="line">430</span><br/><span class="line">431</span><br/><span class="line">432</span><br/><span class="line">433</span><br/><span class="line">434</span><br/><span class="line">435</span><br/><span class="line">436</span><br/><span class="line">437</span><br/><span class="line">438</span><br/><span class="line">439</span><br/><span class="line">440</span><br/></pre></td><td class="code"><pre><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">LuaStrParser</span>:</span></span><br/><span class="line">    __spaceChars = [<span class="string">&#39; &#39;</span>, <span class="string">&#39;t&#39;</span>, <span class="string">&#39;n&#39;</span>, <span class="string">&#39;r&#39;</span>]</span><br/><span class="line">    __stopChars = [<span class="string">&#39; &#39;</span>, <span class="string">&#39;t&#39;</span>, <span class="string">&#39;n&#39;</span>, <span class="string">&#39;r&#39;</span>, <span class="string">&#39;=&#39;</span>, <span class="string">&#39;,&#39;</span>, <span class="string">&#39;;&#39;</span>, <span class="string">&#39;}&#39;</span>, <span class="string">&#39;]&#39;</span>]</span><br/><span class="line">    keyTypes = [int, float, str]</span><br/><span class="line"></span><br/><span class="line">    __specialChars = {</span><br/><span class="line">        <span class="string">&#39;a&#39;</span>: <span class="string">&#39;a&#39;</span>, <span class="string">&#39;b&#39;</span>: <span class="string">&#39;b&#39;</span>, <span class="string">&#39;f&#39;</span>: <span class="string">&#39;f&#39;</span>, <span class="string">&#39;n&#39;</span>: <span class="string">&#39;n&#39;</span>, <span class="string">&#39;r&#39;</span>: <span class="string">&#39;r&#39;</span>, <span class="string">&#39;t&#39;</span>: <span class="string">&#39;t&#39;</span>, <span class="string">&#39;v&#39;</span>: <span class="string">&#39;v&#39;</span>,</span><br/><span class="line">        <span class="string">&#39;\&#39;</span>: <span class="string">&#39;\&#39;</span>, <span class="string">&#39;&#34;&#39;</span>: <span class="string">&#39;&#34;&#39;</span>, <span class="string">&#34;&#39;&#34;</span>: <span class="string">&#34;&#39;&#34;</span>,</span><br/><span class="line">    }</span><br/><span class="line"></span><br/><span class="line">    __reverseSpecialChars = {</span><br/><span class="line">        <span class="string">&#39;a&#39;</span>: <span class="string">&#39;\a&#39;</span>, <span class="string">&#39;b&#39;</span>: <span class="string">&#39;\b&#39;</span>, <span class="string">&#39;f&#39;</span>: <span class="string">&#39;\f&#39;</span>, <span class="string">&#39;n&#39;</span>: <span class="string">&#39;\n&#39;</span>, <span class="string">&#39;r&#39;</span>: <span class="string">&#39;\r&#39;</span>, <span class="string">&#39;t&#39;</span>: <span class="string">&#39;\t&#39;</span>, <span class="string">&#39;v&#39;</span>: <span class="string">&#39;\v&#39;</span>,</span><br/><span class="line">        <span class="string">&#39;\&#39;</span>: <span class="string">&#39;\\&#39;</span>, <span class="string">&#39;&#34;&#39;</span>: <span class="string">&#39;\&#34;&#39;</span>, <span class="string">&#34;&#39;&#34;</span>: <span class="string">&#34;\&#39;&#34;</span></span><br/><span class="line">    }</span><br/><span class="line"></span><br/><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(self)</span>:</span></span><br/><span class="line">        self.__lua_object = <span class="literal">None</span></span><br/><span class="line">        self.__lua_str = <span class="literal">None</span></span><br/><span class="line"></span><br/><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__jumpSpace</span><span class="params">(self, string, loc)</span>:</span></span><br/><span class="line">        <span class="keyword">while</span> loc &lt; len(string) <span class="keyword">and</span> string[loc] <span class="keyword">in</span> self.__spaceChars:</span><br/><span class="line">            loc += <span class="number">1</span></span><br/><span class="line">        <span class="keyword">return</span> loc</span><br/><span class="line"></span><br/><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__getBackSlashNum</span><span class="params">(self, lua_str, loc)</span>:</span></span><br/><span class="line">        backslash_num = <span class="number">0</span></span><br/><span class="line">        <span class="keyword">while</span> loc &gt;= <span class="number">0</span> <span class="keyword">and</span> lua_str[loc] == <span class="string">&#39;\&#39;</span>:</span><br/><span class="line">            loc -= <span class="number">1</span></span><br/><span class="line">            backslash_num += <span class="number">1</span></span><br/><span class="line">        <span class="keyword">return</span> backslash_num</span><br/><span class="line"></span><br/><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__getStringEnd</span><span class="params">(self, lua_str, loc, quote)</span>:</span></span><br/><span class="line">        result = loc + <span class="number">1</span></span><br/><span class="line">        <span class="keyword">if</span> lua_str[loc] == quote:</span><br/><span class="line">            end = lua_str.find(quote, loc + <span class="number">1</span>)</span><br/><span class="line">            <span class="keyword">if</span> end != loc + <span class="number">1</span>:</span><br/><span class="line">                at_end = <span class="literal">False</span></span><br/><span class="line">                <span class="keyword">while</span> <span class="keyword">not</span> at_end:</span><br/><span class="line">                    <span class="keyword">if</span> self.__getBackSlashNum(lua_str, end - <span class="number">1</span>) % <span class="number">2</span> == <span class="number">0</span>:</span><br/><span class="line">                        at_end = <span class="literal">True</span></span><br/><span class="line">                    <span class="keyword">if</span> <span class="keyword">not</span> at_end:</span><br/><span class="line">                        end = lua_str.find(quote, end + <span class="number">1</span>)</span><br/><span class="line">            <span class="keyword">if</span> end &lt; <span class="number">0</span>:</span><br/><span class="line">                <span class="keyword">raise</span> Exception(<span class="string">&#34;wrong quotes!&#34;</span>)</span><br/><span class="line">            result = end</span><br/><span class="line">        <span class="keyword">return</span> result</span><br/><span class="line"></span><br/><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__getStringConent</span><span class="params">(self, lua_str, loc)</span>:</span></span><br/><span class="line">        <span class="string">&#34;&#34;&#34;</span></span><br/><span class="line"><span class="string">        return the string in the  @para lua_str</span></span><br/><span class="line"><span class="string">        thee result contain the quotes&#34;&#34;&#34;</span></span><br/><span class="line">        loc = self.__jumpSpace(lua_str, loc)</span><br/><span class="line">        result = <span class="literal">None</span></span><br/><span class="line">        <span class="keyword">if</span> lua_str[loc] == <span class="string">&#39;&#34;&#39;</span> <span class="keyword">or</span> lua_str[loc] == <span class="string">&#34;&#39;&#34;</span>:</span><br/><span class="line">            end = self.__getStringEnd(lua_str, loc, lua_str[loc])</span><br/><span class="line">            result = lua_str[loc: end + <span class="number">1</span>]</span><br/><span class="line">            loc = end + <span class="number">1</span></span><br/><span class="line">        <span class="keyword">return</span> result, loc</span><br/><span class="line"></span><br/><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__removeComment</span><span class="params">(self, lua_str)</span>:</span></span><br/><span class="line">        result = <span class="string">&#34;&#34;</span></span><br/><span class="line">        loc = <span class="number">0</span></span><br/><span class="line">        <span class="keyword">while</span> loc &lt; len(lua_str):</span><br/><span class="line">            </span><br/><span class="line">            <span class="keyword">if</span> lua_str[loc] == <span class="string">&#39;&#34;&#39;</span> <span class="keyword">or</span> lua_str[loc] == <span class="string">&#34;&#39;&#34;</span>:</span><br/><span class="line">                string, loc = self.__getStringConent(lua_str, loc)</span><br/><span class="line">                result += string</span><br/><span class="line">            <span class="comment"># remove comment</span></span><br/><span class="line">            <span class="keyword">elif</span> lua_str[loc] == <span class="string">&#39;-&#39;</span>:</span><br/><span class="line">                <span class="keyword">if</span> loc + <span class="number">1</span> &lt; len(lua_str) <span class="keyword">and</span> lua_str[loc + <span class="number">1</span>] == <span class="string">&#39;-&#39;</span>:</span><br/><span class="line">                    loc += <span class="number">2</span></span><br/><span class="line">                    <span class="comment"># multi line comments</span></span><br/><span class="line">                    <span class="keyword">if</span> loc + <span class="number">1</span> &lt; len(lua_str) <span class="keyword">and</span> lua_str[loc:loc + <span class="number">2</span>] == <span class="string">&#39;[[&#39;</span>:</span><br/><span class="line">                        loc = lua_str.find(<span class="string">&#39;]]&#39;</span>, loc + <span class="number">1</span>) + <span class="number">2</span></span><br/><span class="line">                    <span class="comment"># single line comment</span></span><br/><span class="line">                    <span class="keyword">else</span>:</span><br/><span class="line">                        loc = lua_str.find(<span class="string">&#39;n&#39;</span>, loc + <span class="number">1</span>) + <span class="number">1</span></span><br/><span class="line">                    <span class="comment"># add a space after remove the comment</span></span><br/><span class="line">                    result += <span class="string">&#39; &#39;</span></span><br/><span class="line">                <span class="keyword">else</span>:</span><br/><span class="line">                    result += lua_str[loc]</span><br/><span class="line">                    loc += <span class="number">1</span></span><br/><span class="line">            <span class="comment"># remove &#39;r&#39;</span></span><br/><span class="line">            <span class="keyword">elif</span> lua_str[loc] == <span class="string">&#39;r&#39;</span>:</span><br/><span class="line">                loc += <span class="number">1</span></span><br/><span class="line">                <span class="keyword">continue</span></span><br/><span class="line">            <span class="keyword">else</span>:</span><br/><span class="line">                result += lua_str[loc]</span><br/><span class="line">                loc += <span class="number">1</span></span><br/><span class="line">        <span class="keyword">return</span> result</span><br/><span class="line"></span><br/><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__getRightBrace</span><span class="params">(self, lua_str, loc)</span>:</span></span><br/><span class="line">        loc = lua_str.find(<span class="string">&#39;{&#39;</span>, loc) + <span class="number">1</span></span><br/><span class="line">        left_barce_num = <span class="number">0</span></span><br/><span class="line">        <span class="keyword">while</span> loc &lt; len(lua_str):</span><br/><span class="line">            <span class="keyword">if</span> lua_str[loc] == <span class="string">&#39;&#34;&#39;</span> <span class="keyword">or</span> lua_str[loc] == <span class="string">&#34;&#39;&#34;</span>:</span><br/><span class="line">                loc = self.__getStringEnd(lua_str, loc, lua_str[loc]) + <span class="number">1</span></span><br/><span class="line">            <span class="keyword">elif</span> lua_str[loc] == <span class="string">&#39;{&#39;</span>:</span><br/><span class="line">                left_barce_num -= <span class="number">1</span></span><br/><span class="line">                loc += <span class="number">1</span></span><br/><span class="line">            <span class="keyword">elif</span> lua_str[loc] == <span class="string">&#39;}&#39;</span>:</span><br/><span class="line">                left_barce_num += <span class="number">1</span></span><br/><span class="line">                <span class="keyword">if</span> left_barce_num &gt;= <span class="number">1</span>:</span><br/><span class="line">                    <span class="keyword">break</span></span><br/><span class="line">                loc += <span class="number">1</span></span><br/><span class="line">            <span class="keyword">else</span>:</span><br/><span class="line">                loc += <span class="number">1</span></span><br/><span class="line">        <span class="keyword">if</span> loc == len(lua_str):</span><br/><span class="line">            <span class="keyword">raise</span> Exception(<span class="string">&#34;wrong number of brace&#34;</span>)</span><br/><span class="line">        <span class="keyword">return</span> loc</span><br/><span class="line"></span><br/><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__getRightBracket</span><span class="params">(self, lua_str, loc)</span>:</span></span><br/><span class="line">        loc = lua_str.find(<span class="string">&#39;[&#39;</span>, loc) + <span class="number">1</span></span><br/><span class="line">        <span class="keyword">while</span> loc &lt; len(lua_str):</span><br/><span class="line">            <span class="keyword">if</span> lua_str[loc] == <span class="string">&#39;&#34;&#39;</span> <span class="keyword">or</span> lua_str[loc] == <span class="string">&#34;&#39;&#34;</span>:</span><br/><span class="line">                loc = self.__getStringEnd(lua_str, loc, lua_str[loc]) + <span class="number">1</span></span><br/><span class="line">            <span class="keyword">elif</span> lua_str[loc] == <span class="string">&#39;]&#39;</span>:</span><br/><span class="line">                <span class="keyword">break</span></span><br/><span class="line">            <span class="keyword">else</span>:</span><br/><span class="line">                loc += <span class="number">1</span></span><br

    <script type="text/javascript">
  const stellar = {
    // 懒加载 css https://github.com/filamentgroup/loadCSS
    loadCSS: (href, before, media, attributes) => {
      var doc = window.document;
      var ss = doc.createElement("link");
      var ref;
      if (before) {
        ref = before;
      } else {
        var refs = (doc.body || doc.getElementsByTagName("head")[0]).childNodes;
        ref = refs[refs.length - 1];
      }
      var sheets = doc.styleSheets;
      if (attributes) {
        for (var attributeName in attributes) {
          if (attributes.hasOwnProperty(attributeName)) {
            ss.setAttribute(attributeName, attributes[attributeName]);
          }
        }
      }
      ss.rel = "stylesheet";
      ss.href = href;
      ss.media = "only x";
      function ready(cb) {
        if (doc.body) {
          return cb();
        }
        setTimeout(function () {
          ready(cb);
        });
      }
      ready(function () {
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
      });
      var onloadcssdefined = function (cb) {
        var resolvedHref = ss.href;
        var i = sheets.length;
        while (i--) {
          if (sheets[i].href === resolvedHref) {
            return cb();
          }
        }
        setTimeout(function () {
          onloadcssdefined(cb);
        });
      };
      function loadCB() {
        if (ss.addEventListener) {
          ss.removeEventListener("load", loadCB);
        }
        ss.media = media || "all";
      }
      if (ss.addEventListener) {
        ss.addEventListener("load", loadCB);
      }
      ss.onloadcssdefined = onloadcssdefined;
      onloadcssdefined(loadCB);
      return ss;
    },

    // 从 butterfly 和 volantis 获得灵感
    loadScript: (src, opt) => new Promise((resolve, reject) => {
      var script = document.createElement('script');
      script.src = src;
      if (opt) {
        for (let key of Object.keys(opt)) {
          script[key] = opt[key]
        }
      } else {
        // 默认异步，如果需要同步，第二个参数传入 {} 即可
        script.async = true
      }
      script.onerror = reject
      script.onload = script.onreadystatechange = function() {
        const loadState = this.readyState
        if (loadState && loadState !== 'loaded' && loadState !== 'complete') return
        script.onload = script.onreadystatechange = null
        resolve()
      }
      document.head.appendChild(script)
    }),

    // https://github.com/jerryc127/hexo-theme-butterfly
    jQuery: (fn) => {
      if (typeof jQuery === 'undefined') {
        stellar.loadScript(stellar.plugins.jQuery).then(fn)
      } else {
        fn()
      }
    }
  };
  stellar.version = '1.18.5';
  stellar.github = 'https://github.com/xaoxuu/hexo-theme-stellar/tree/1.18.5';
  stellar.config = {
    date_suffix: {
      just: '刚刚',
      min: '分钟前',
      hour: '小时前',
      day: '天前',
      month: '个月前',
    },
  };

  // required plugins (only load if needs)
  stellar.plugins = {
    jQuery: 'https://gcore.jsdelivr.net/npm/jquery@3.6.2/dist/jquery.min.js'
  };

  if ('local_search') {
    stellar.search = {};
    stellar.search.service = 'local_search';
    if (stellar.search.service == 'local_search') {
      let service_obj = Object.assign({}, {"field":"all","path":"/search.json","content":true,"sort":"-date"});
      stellar.search[stellar.search.service] = service_obj;
    }
  }

  // stellar js
  stellar.plugins.stellar = Object.assign({"sites":"/js/plugins/sites.js","friends":"/js/plugins/friends.js","ghinfo":"/js/plugins/ghinfo.js","timeline":"/js/plugins/timeline.js","linkcard":"/js/plugins/linkcard.js","fcircle":"/js/plugins/fcircle.js","weibo":"/js/plugins/weibo.js"});

  stellar.plugins.marked = Object.assign("https://cdn.bootcdn.net/ajax/libs/marked/4.0.18/marked.min.js");
  // optional plugins
  if ('true' == 'true') {
    stellar.plugins.lazyload = Object.assign({"enable":true,"js":"https://gcore.jsdelivr.net/npm/vanilla-lazyload@17.8.3/dist/lazyload.min.js","transition":"blur"});
  }
  if ('true' == 'true') {
    stellar.plugins.swiper = Object.assign({"enable":true,"css":"https://unpkg.com/swiper@8.4.5/swiper-bundle.min.css","js":"https://unpkg.com/swiper@8.4.5/swiper-bundle.min.js"});
  }
  if ('' == 'true') {
    stellar.plugins.scrollreveal = Object.assign({"enable":null,"js":"https://gcore.jsdelivr.net/npm/scrollreveal@4.0.9/dist/scrollreveal.min.js","distance":"8px","duration":500,"interval":100,"scale":1});
  }
  if ('true' == 'true') {
    stellar.plugins.preload = Object.assign({"enable":true,"service":"flying_pages","instant_page":"https://gcore.jsdelivr.net/gh/volantis-x/cdn-volantis@4.1.2/js/instant_page.js","flying_pages":"https://gcore.jsdelivr.net/gh/gijo-varghese/flying-pages@2.1.2/flying-pages.min.js"});
  }
  if ('true' == 'true') {
    stellar.plugins.fancybox = Object.assign({"enable":true,"js":"https://gcore.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.umd.js","css":"https://gcore.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.css","selector":".swiper-slide img"});
  }
  if ('false' == 'true') {
    stellar.plugins.heti = Object.assign({"enable":false,"css":"https://unpkg.com/heti@0.9.2/umd/heti.min.css","js":"https://unpkg.com/heti@0.9.2/umd/heti-addon.min.js"});
  }
</script>
