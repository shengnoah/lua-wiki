<h1 class="article-title"><span>反编译OpenWrt的Lua文件</span></h1>
<div id="md_content_2" class="md_content" style="min-height: 50px;"><textarea id="append-test" style="display:none;">![](https://xiaokou.top/usr/uploads/md/1569651126274.png)
先是今天的主角，极路由。

<p>获取root权限然后拿到web源码，找到对应文件</p>
<p><img class="lazy" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAABGdBTUEAALGPC/xhBQAAADhlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAAqACAAQAAAABAAAAAaADAAQAAAABAAAAAQAAAADa6r/EAAAAC0lEQVQIHWNgAAIAAAUAAY27m/MAAAAASUVORK5CYII=" data-src="https://xiaokou.top/usr/uploads/md/1569651204062.png"></p>
<p><img class="lazy" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAABGdBTUEAALGPC/xhBQAAADhlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAAqACAAQAAAABAAAAAaADAAQAAAABAAAAAQAAAADa6r/EAAAAC0lEQVQIHWNgAAIAAAUAAY27m/MAAAAASUVORK5CYII=" data-src="https://xiaokou.top/usr/uploads/md/1569651262766.png"><br><img class="lazy" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAABGdBTUEAALGPC/xhBQAAADhlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAAqACAAQAAAABAAAAAaADAAQAAAABAAAAAQAAAADa6r/EAAAAC0lEQVQIHWNgAAIAAAUAAY27m/MAAAAASUVORK5CYII=" data-src="https://xiaokou.top/usr/uploads/md/1569651242403.png"></p>
<p><img class="lazy" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAABGdBTUEAALGPC/xhBQAAADhlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAAqACAAQAAAABAAAAAaADAAQAAAABAAAAAQAAAADa6r/EAAAAC0lEQVQIHWNgAAIAAAUAAY27m/MAAAAASUVORK5CYII=" data-src="https://xiaokou.top/usr/uploads/md/1569651287367.png"><br>确认了是lua 5.1以后，google找到了<a target="_blank" rel="noopener" href="http://ju.outofmemory.cn/entry/356320">文章</a>，根据内容操作发现了一些问题，最后也都解决了，在这里做一个记录。<br>首先</p>
<ol>
<li>Lua有一种预编译机制，能够把文本代码预编译成Bytecode&#x2F;Opcode 提高解析、执行速度，降低内存占用</li>
<li>原版Lua（Vanilla Lua）默认的Bytecode的字节结构和OpenWrt的并不相同，因为OpenWrt为了一系列需要，在截止我写此文时候， 在Lua5.1.5的版本主线上 ， 对原版的LUA引擎打了补丁 ， 导致其产生的字节码和原版的Lua产生的并不一样 ，（ <a target="_blank" rel="noopener" href="http://lua-users.org/lists/lua-l/2012-06/msg00065.html">http://lua-users.org/lists/lua-l/2012-06/msg00065.html</a> ），因此也不能使用原版的Lua引擎解释，会报类似 bad header in precompiled chunk 的错误</li>
<li>本机尝试逆向原版的Lua产生的LuaC， 使用这个 luadec 项目 无任何问题   ，但是逆向Openwrt上的luaC失败， 所以需要在Openwrt的Patch过的Lua lib的基础上 ，编译luadec</li>
</ol>
<p>如果是常规的lua文件 使用Unluac就可以。<br>但是我们的这个luac文件是openwrt处理后的，也就不能使用常规的unluac，需要手动打补丁。</p>
<ol start="4">
<li>过程<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line"> #安装依赖</span><br><span class="line">sudo apt install libncurses-dev libreadline-dev</span><br><span class="line">#获得luadec源码</span><br><span class="line">git clone https://github.com/viruscamp/luadec</span><br><span class="line">cd luadec</span><br><span class="line">git submodule update --init lua-5.1</span><br><span class="line">#下面开始不同</span><br><span class="line">ref=master</span><br><span class="line">patch_dir=patches.$ref</span><br><span class="line">mkdir $patch_dir &amp;amp;&amp;amp; cd $patch_dir</span><br><span class="line">#如下命令需要grep支持pcre正则，如果不支持，请自己手动处理把。 </span><br><span class="line">patchs=$(curl -sSL -H &amp;#39;Accept: application/vnd.github.v3+json&amp;#39; &amp;#39;https://api.github.com/repos/openwrt/openwrt/contents/package/utils/lua/patches?ref=&amp;#39;&amp;#34;$ref&amp;#34; |grep -oP &amp;#39;name&amp;#34;s*:s*&amp;#34;.*.patch&amp;#39; |grep -oP &amp;#39;d+.*.patch&amp;#39;)</span><br><span class="line">#下载补丁文件</span><br><span class="line">#这里的补丁如果下载不成功，可以访问https://github.com/openwrt/openwrt/tree/master/package/utils/lua/patches-host</span><br><span class="line">手动下载替换。</span><br><span class="line">for p in $patchs;do  </span><br><span class="line">wget &amp;#39;https://github.com/openwrt-mirror/openwrt/raw/&amp;#39;&amp;#34;$ref&amp;#34;&amp;#39;/package/utils/lua/patches/&amp;#39;$&#123;p&#125;  -O $p; </span><br><span class="line">done</span><br><span class="line">cd ../lua-5.1</span><br><span class="line">#打上补丁</span><br><span class="line">for i in ../$&#123;patch_dir&#125;/*.patch; do patch -p1 &amp;lt;$i ; done</span><br><span class="line">make linux</span><br></pre></td></tr></table></figure>
根据原文内的提示：<br><code>需要修改Makefile 给CFLAGS加上 -fPIC 选项 另外，为了使得Patch过后生成的so文件带版本号，还需要加上版本，最终生成的是如下的lua-5.1/src/Makefile的补丁 </code></li>
</ol>
<p>这里修改的是lua-5.1&#x2F;src下的Makefile</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line">--- Makefile.bak	2018-05-29 18:04:44.979014076 +0800</span><br><span class="line">+++ Makefile	2018-05-29 18:21:35.110112120 +0800</span><br><span class="line">@@ -8,7 +8,7 @@</span><br><span class="line"> PLAT= none</span><br><span class="line"> </span><br><span class="line"> CC= gcc</span><br><span class="line">-CFLAGS= -O2 -Wall $(MYCFLAGS)</span><br><span class="line">+CFLAGS=  -fPIC -O2 -Wall $(MYCFLAGS)</span><br><span class="line"> AR= ar rcu</span><br><span class="line"> RANLIB= ranlib</span><br><span class="line"> RM= rm -f</span><br><span class="line">@@ -18,7 +18,7 @@</span><br><span class="line"> MYLDFLAGS=</span><br><span class="line"> MYLIBS=</span><br><span class="line"> # USE_READLINE=1</span><br><span class="line">-</span><br><span class="line">+PKG_VERSION = 5.1.5</span><br><span class="line"> # == END OF USER SETTINGS. NO NEED TO CHANGE ANYTHING BELOW THIS LINE =========</span><br><span class="line"> </span><br><span class="line"> PLATS= aix ansi bsd freebsd generic linux macosx mingw posix solaris</span><br><span class="line"> #由于openwrt中的lua默认情况下是通过动态链接库进行编译，会出现找不到函数体的错误，参考源码中的设置，将对lua库的连接改为静态：</span><br><span class="line"> </span><br><span class="line">  $(LUA_T): $(LUA_O) $(LUA_A)</span><br><span class="line">	$(CC) -o $@ -L. -llua $(MYLDFLAGS) $(LUA_O) $(LUA_A) $(LIBS)</span><br><span class="line"></span><br><span class="line">$(LUAC_T): $(LUAC_O) $(LUA_A)</span><br><span class="line">	$(CC) -o $@ -L. -llua $(MYLDFLAGS) $(LUAC_O) $(LUA_A) $(LIBS)</span><br><span class="line"></span><br></pre></td></tr></table></figure>


<p>做完这些以后，执行一下操作完成编译<br>make linux<br>export LD_LIBRARY_PATH&#x3D;<code>pwd</code>&#x2F;src&#x2F;<br>cd ..&#x2F;luadec<br>make LUAVER&#x3D;5.1</p>
<ol start="5">
<li>反编译luci-indexcache<br><img class="lazy" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAABGdBTUEAALGPC/xhBQAAADhlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAAqACAAQAAAABAAAAAaADAAQAAAABAAAAAQAAAADa6r/EAAAAC0lEQVQIHWNgAAIAAAUAAY27m/MAAAAASUVORK5CYII=" data-src="https://xiaokou.top/usr/uploads/md/1569652208101.png"></li>
</ol>
