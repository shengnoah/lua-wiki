用驼峰。</span></span><br/><span class="line"></span><br/><span class="line">  <span class="comment">-- 如何定义局部变量： </span></span><br/><span class="line">  <span class="keyword">local</span> line = <span class="built_in">io</span>.<span class="built_in">read</span>()  <span class="comment">-- 读取标准输入的下一行。 </span></span><br/><span class="line"></span><br/><span class="line">  <span class="comment">-- ..操作符用于连接字符串： </span></span><br/><span class="line">  <span class="built_in">print</span>(<span class="string">&#39;Winter is coming, &#39;</span> .. line) </span><br/><span class="line"><span class="keyword">end</span> </span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 未定义的变量返回nil。 </span></span><br/><span class="line"><span class="comment">-- 这不是错误： </span></span><br/><span class="line">foo = anUnknownVariable  <span class="comment">-- 现在 foo = nil. </span></span><br/><span class="line"></span><br/><span class="line">aBoolValue = <span class="literal">false</span> </span><br/><span class="line"></span><br/><span class="line"><span class="comment">--只有nil和false为假; 0和 &#39;&#39;均为真！ </span></span><br/><span class="line"><span class="keyword">if</span> <span class="keyword">not</span> aBoolValue <span class="keyword">then</span> <span class="built_in">print</span>(<span class="string">&#39;false&#39;</span>) <span class="keyword">end</span> </span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- &#39;or&#39;和 &#39;and&#39;短路 </span></span><br/><span class="line"><span class="comment">-- 类似于C/js里的 a?b:c 操作符： </span></span><br/><span class="line">ans = aBoolValue <span class="keyword">and</span> <span class="string">&#39;yes&#39;</span> <span class="keyword">or</span> <span class="string">&#39;no&#39;</span>  <span class="comment">--&gt; &#39;no&#39; </span></span><br/><span class="line"></span><br/><span class="line">karlSum = <span class="number">0</span> </span><br/><span class="line"><span class="keyword">for</span> i = <span class="number">1</span>, <span class="number">100</span> <span class="keyword">do</span>  <span class="comment">-- 范围包含两端 </span></span><br/><span class="line">  karlSum = karlSum + i </span><br/><span class="line"><span class="keyword">end</span> </span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 使用 &#34;100, 1, -1&#34; 表示递减的范围： </span></span><br/><span class="line">fredSum = <span class="number">0</span> </span><br/><span class="line"><span class="keyword">for</span> j = <span class="number">100</span>, <span class="number">1</span>, <span class="number">-1</span> <span class="keyword">do</span> fredSum = fredSum + j <span class="keyword">end</span> </span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 通常，范围表达式为begin, end[, step]. </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 循环的另一种结构： </span></span><br/><span class="line"><span class="keyword">repeat</span> </span><br/><span class="line">  <span class="built_in">print</span>(<span class="string">&#39;the way of the future&#39;</span>) </span><br/><span class="line">  num = num - <span class="number">1</span> </span><br/><span class="line"><span class="keyword">until</span> num == <span class="number">0</span> </span><br/><span class="line"></span><br/><span class="line"><span class="comment">---------------------------------------------------- </span></span><br/><span class="line"><span class="comment">-- 2. 函数。 </span></span><br/><span class="line"><span class="comment">---------------------------------------------------- </span></span><br/><span class="line"></span><br/><span class="line"><span class="function"><span class="keyword">function</span> <span class="params">(n)</span></span></span><br/><span class="line">  <span class="keyword">if</span> n &lt; <span class="number">2</span> <span class="keyword">then</span> <span class="keyword">return</span> n <span class="keyword">end</span></span><br/><span class="line">  <span class="keyword">return</span> fib(n - <span class="number">2</span>) + fib(n - <span class="number">1</span>)</span><br/><span class="line"><span class="keyword">end</span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 支持闭包及匿名函数： </span></span><br/><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">adder</span><span class="params">(x)</span></span> </span><br/><span class="line">  <span class="comment">-- 调用adder时，会创建返回的函数，</span></span><br/><span class="line">  <span class="comment">-- 并且会记住x的值： </span></span><br/><span class="line">  <span class="keyword">return</span> <span class="function"><span class="keyword">function</span> <span class="params">(y)</span></span> <span class="keyword">return</span> x + y <span class="keyword">end</span> </span><br/><span class="line"><span class="keyword">end</span> </span><br/><span class="line">a1 = adder(<span class="number">9</span>) </span><br/><span class="line">a2 = adder(<span class="number">36</span>) </span><br/><span class="line"><span class="built_in">print</span>(a1(<span class="number">16</span>))  <span class="comment">--&gt; 25 </span></span><br/><span class="line"><span class="built_in">print</span>(a2(<span class="number">64</span>))  <span class="comment">--&gt; 100 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 返回值、函数调用和赋值都可以</span></span><br/><span class="line"><span class="comment">-- 使用长度不匹配的list。 </span></span><br/><span class="line"><span class="comment">-- 不匹配的接收方会被赋值nil； </span></span><br/><span class="line"><span class="comment">-- 不匹配的发送方会被丢弃。 </span></span><br/><span class="line"></span><br/><span class="line">x, y, z = <span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">4</span> </span><br/><span class="line"><span class="comment">-- x = 1、y = 2、z = 3, 而 4 会被丢弃。 </span></span><br/><span class="line"></span><br/><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">bar</span><span class="params">(a, b, c)</span></span> </span><br/><span class="line">  <span class="built_in">print</span>(a, b, c) </span><br/><span class="line">  <span class="keyword">return</span> <span class="number">4</span>, <span class="number">8</span>, <span class="number">15</span>, <span class="number">16</span>, <span class="number">23</span>, <span class="number">42</span> </span><br/><span class="line"><span class="keyword">end</span> </span><br/><span class="line"></span><br/><span class="line">x, y = bar(<span class="string">&#39;zaphod&#39;</span>)  <span class="comment">--&gt; 打印 &#34;zaphod  nil nil&#34; </span></span><br/><span class="line"><span class="comment">-- 现在 x = 4, y = 8, 而值15..42被丢弃。 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 函数是一等公民，可以是局部的，也可以是全局的。 </span></span><br/><span class="line"><span class="comment">-- 以下表达式等价： </span></span><br/><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">f</span><span class="params">(x)</span></span> <span class="keyword">return</span> x * x <span class="keyword">end</span> </span><br/><span class="line">f = <span class="function"><span class="keyword">function</span> <span class="params">(x)</span></span> <span class="keyword">return</span> x * x <span class="keyword">end</span> </span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 这些也是等价的： </span></span><br/><span class="line"><span class="keyword">local</span> <span class="function"><span class="keyword">function</span> <span class="title">g</span><span class="params">(x)</span></span> <span class="keyword">return</span> <span class="built_in">math</span>.<span class="built_in">sin</span>(x) <span class="keyword">end</span></span><br/><span class="line"><span class="keyword">local</span> g; g = <span class="function"><span class="keyword">function</span> <span class="params">(x)</span></span> <span class="keyword">return</span> <span class="built_in">math</span>.<span class="built_in">sin</span>(x) <span class="keyword">end</span></span><br/><span class="line"><span class="comment">-- 以上均因&#39;local g&#39;，使得g可以自引用。</span></span><br/><span class="line"><span class="keyword">local</span> g = <span class="function"><span class="keyword">function</span><span class="params">(x)</span></span> <span class="keyword">return</span> <span class="built_in">math</span>.<span class="built_in">sin</span>(x) <span class="keyword">end</span></span><br/><span class="line"><span class="comment">-- 等价于 local function g(x)..., 但函数体中g不可自引用</span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 顺便提下，三角函数以弧度为单位。 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 用一个字符串参数调用函数，可以省略括号： </span></span><br/><span class="line"><span class="built_in">print</span> <span class="string">&#39;hello&#39;</span>  <span class="comment">--可以工作。 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 调用函数时，如果只有一个table参数，</span></span><br/><span class="line"><span class="comment">-- 同样可以省略括号（table详情见下）：</span></span><br/><span class="line"><span class="built_in">print</span> {} <span class="comment">-- 一样可以工作。</span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">---------------------------------------------------- </span></span><br/><span class="line"><span class="comment">-- 3. Table。 </span></span><br/><span class="line"><span class="comment">---------------------------------------------------- </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- Table = Lua唯一的组合数据结构; </span></span><br/><span class="line"><span class="comment">--         它们是关联数组。 </span></span><br/><span class="line"><span class="comment">-- 类似于PHP的数组或者js的对象， </span></span><br/><span class="line"><span class="comment">-- 它们是哈希表或者字典，也可以当列表使用。 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 按字典/map的方式使用Table： </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- Dict字面量默认使用字符串类型的key： </span></span><br/><span class="line">t = {key1 = <span class="string">&#39;value1&#39;</span>, key2 = <span class="literal">false</span>} </span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 字符串key可以使用类似js的点标记： </span></span><br/><span class="line"><span class="built_in">print</span>(t.key1)  <span class="comment">-- 打印 &#39;value1&#39;. </span></span><br/><span class="line">t.newKey = {}  <span class="comment">-- 添加新的键值对。 </span></span><br/><span class="line">t.key2 = <span class="literal">nil</span>   <span class="comment">-- 从table删除 key2。 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 使用任何非nil的值作为key： </span></span><br/><span class="line">u = {[<span class="string">&#39;@!#&#39;</span>] = <span class="string">&#39;qbert&#39;</span>, [{}] = <span class="number">1729</span>, [<span class="number">6.28</span>] = <span class="string">&#39;tau&#39;</span>} </span><br/><span class="line"><span class="built_in">print</span>(u[<span class="number">6.28</span>])  <span class="comment">-- 打印 &#34;tau&#34; </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 数字和字符串的key按值匹配的</span></span><br/><span class="line"><span class="comment">-- table按id匹配。 </span></span><br/><span class="line">a = u[<span class="string">&#39;@!#&#39;</span>]  <span class="comment">-- 现在 a = &#39;qbert&#39;. </span></span><br/><span class="line">b = u[{}]     <span class="comment">-- 我们或许期待的是 1729,  但是得到的是nil: </span></span><br/><span class="line"><span class="comment">-- b = nil ，因为没有找到。 </span></span><br/><span class="line"><span class="comment">-- 之所以没找到，是因为我们用的key与保存数据时用的不是同</span></span><br/><span class="line"><span class="comment">-- 一个对象。 </span></span><br/><span class="line"><span class="comment">-- 所以字符串和数字是移植性更好的key。 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 只需要一个table参数的函数调用不需要括号： </span></span><br/><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">h</span><span class="params">(x)</span></span> <span class="built_in">print</span>(x.key1) <span class="keyword">end</span> </span><br/><span class="line">h{key1 = <span class="string">&#39;Sonmi~451&#39;</span>}  <span class="comment">-- 打印&#39;Sonmi~451&#39;. </span></span><br/><span class="line"></span><br/><span class="line"><span class="keyword">for</span> key, val <span class="keyword">in</span> <span class="built_in">pairs</span>(u) <span class="keyword">do</span>  <span class="comment">-- 遍历Table</span></span><br/><span class="line">  <span class="built_in">print</span>(key, val) </span><br/><span class="line"><span class="keyword">end</span> </span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- _G 是一个特殊的table，用于保存所有的全局变量 </span></span><br/><span class="line"><span class="built_in">print</span>(<span class="built_in">_G</span>[<span class="string">&#39;_G&#39;</span>] == <span class="built_in">_G</span>)  <span class="comment">-- 打印&#39;true&#39;. </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 按列表/数组的方式使用： </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 列表字面量隐式添加整数键： </span></span><br/><span class="line">v = {<span class="string">&#39;value1&#39;</span>, <span class="string">&#39;value2&#39;</span>, <span class="number">1.21</span>, <span class="string">&#39;gigawatts&#39;</span>} </span><br/><span class="line"><span class="keyword">for</span> i = <span class="number">1</span>, #v <span class="keyword">do</span>  <span class="comment">-- #v 是列表的大小</span></span><br/><span class="line">  <span class="built_in">print</span>(v[i])  <span class="comment">-- 索引从 1 开始!! 太疯狂了！ </span></span><br/><span class="line"><span class="keyword">end</span></span><br/><span class="line"><span class="comment">-- &#39;list&#39;并非真正的类型，v 其实是一个table， </span></span><br/><span class="line"><span class="comment">-- 只不过它用连续的整数作为key，可以像list那样去使用。 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">---------------------------------------------------- </span></span><br/><span class="line"><span class="comment">-- 3.1 元表（metatable） 和元方法（metamethod）。 </span></span><br/><span class="line"><span class="comment">---------------------------------------------------- </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- table的元表提供了一种机制，支持类似操作符重载的行为。</span></span><br/><span class="line"><span class="comment">-- 稍后我们会看到元表如何支持类似js prototype的行为。 </span></span><br/><span class="line"></span><br/><span class="line">f1 = {a = <span class="number">1</span>, b = <span class="number">2</span>}  <span class="comment">-- 表示一个分数 a/b. </span></span><br/><span class="line">f2 = {a = <span class="number">2</span>, b = <span class="number">3</span>} </span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- 这会失败：</span></span><br/><span class="line"><span class="comment">-- s = f1 + f2 </span></span><br/><span class="line"></span><br/><span class="line">metafraction = {} </span><br/><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">metafraction.__add</span><span class="params">(f1, f2)</span></span> </span><br/><span class="line">  <span class="keyword">local</span> sum = {} </span><br/><span class="line">  sum.b = f1.b * f2.b </span><br/><span class="line">  sum.a = f1.a * f2.b + f2.a * f1.b </span><br/><span class="line">  <span class="keyword">return</span> sum</span><br/><span class="line"><span class="keyword">end</span></span><br/><span class="line"></span><br/><span class="line"><span class="built_in">setmetatable</span>(f1, metafraction) </span><br/><span class="line"><span class="built_in">setmetatable</span>(f2, metafraction) </span><br/><span class="line"></span><br/><span class="line">s = f1 + f2  <span class="comment">-- 调用在f1的元表上的__add(f1, f2) 方法 </span></span><br/><span class="line"></span><br/><span class="line"><span class="comment">-- f1, f2 没有关于元表的key，这点和js的prototype不一样。 </span></span><br/><span class="line"><span class="comment">-- 因此你必须用getmetatable(f1)获取元表。</span></span><br/><span class="line"><span class="comment">-- 元表是一个普通的table， </span></span><br/><span class="line"><span cla

    <script type="text/javascript">
  const stellar = {
    // 懒加载 css https://github.com/filamentgroup/loadCSS
    loadCSS: (href, before, media, attributes) => {
      var doc = window.document;
      var ss = doc.createElement("link");
      var ref;
      if (before) {
        ref = before;
      } else {
        var refs = (doc.body || doc.getElementsByTagName("head")[0]).childNodes;
        ref = refs[refs.length - 1];
      }
      var sheets = doc.styleSheets;
      if (attributes) {
        for (var attributeName in attributes) {
          if (attributes.hasOwnProperty(attributeName)) {
            ss.setAttribute(attributeName, attributes[attributeName]);
          }
        }
      }
      ss.rel = "stylesheet";
      ss.href = href;
      ss.media = "only x";
      function ready(cb) {
        if (doc.body) {
          return cb();
        }
        setTimeout(function () {
          ready(cb);
        });
      }
      ready(function () {
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
      });
      var onloadcssdefined = function (cb) {
        var resolvedHref = ss.href;
        var i = sheets.length;
        while (i--) {
          if (sheets[i].href === resolvedHref) {
            return cb();
          }
        }
        setTimeout(function () {
          onloadcssdefined(cb);
        });
      };
      function loadCB() {
        if (ss.addEventListener) {
          ss.removeEventListener("load", loadCB);
        }
        ss.media = media || "all";
      }
      if (ss.addEventListener) {
        ss.addEventListener("load", loadCB);
      }
      ss.onloadcssdefined = onloadcssdefined;
      onloadcssdefined(loadCB);
      return ss;
    },

    // 从 butterfly 和 volantis 获得灵感
    loadScript: (src, opt) => new Promise((resolve, reject) => {
      var script = document.createElement('script');
      script.src = src;
      if (opt) {
        for (let key of Object.keys(opt)) {
          script[key] = opt[key]
        }
      } else {
        // 默认异步，如果需要同步，第二个参数传入 {} 即可
        script.async = true
      }
      script.onerror = reject
      script.onload = script.onreadystatechange = function() {
        const loadState = this.readyState
        if (loadState && loadState !== 'loaded' && loadState !== 'complete') return
        script.onload = script.onreadystatechange = null
        resolve()
      }
      document.head.appendChild(script)
    }),

    // https://github.com/jerryc127/hexo-theme-butterfly
    jQuery: (fn) => {
      if (typeof jQuery === 'undefined') {
        stellar.loadScript(stellar.plugins.jQuery).then(fn)
      } else {
        fn()
      }
    }
  };

  if ('' == 'true') {

  }
  if ('true' == 'true') {
    stellar.plugins.fancybox = Object.assign({"enable":true,"js":"https://gcore.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.umd.js","css":"https://gcore.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.css","selector":".swiper-slide img"});
